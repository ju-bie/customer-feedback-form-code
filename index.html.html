<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>
  <body>
    <style>
  body {
    font-family: Arial;
    background-color: #FFFAF5;
    padding: 30px;
  }
  </style>
    <h1 id="title">Customer Opinion</h1>
    <p id="description">
      Use the form below to let us know about your experience at our restaurant
      and what could be improved.
    </p>

    <form id="survey-form">
      <label for="name" id="name-label">Name (required):</label>
      <input
        required
        type="text"
        id="name"
        placeholder="example: Harry Potter"
      />

      <label for="email" id="email-label">Email (required):</label>
      <input
        required
        type="email"
        id="email"
        placeholder="example: bar_bie@mail.com"
      />

      <label for="number" id="number-label">Age:</label>
      <input
        type="number"
        id="number"
        min="15"
        max="100"
        placeholder="example: 22"
      />

      <label for="dropdown">Which dish was your favorite?</label>
      <select name="favorite-meal" id="dropdown">
        <option value="chicken-pulao">Chicken Pulao</option>
        <option value="curry">Curry</option>
        <option value="biryani">Biryani</option>
      </select>

      <fieldset>
        <legend>Which dish should we add next?</legend>

        <input
          id="kebab"
          type="radio"
          name="food-to-introduce"
          value="kebab"
        />
        <label for="kebab">Kebab</label>

        <input
          id="kheer"
          type="radio"
          name="food-to-introduce"
          value="kheer"
        />
        <label for="kheer">Kheer</label>
      </fieldset>

      <fieldset>
        <legend>Please select the items you have ordered in the past:</legend>

        <input type="checkbox" id="murog-pulao" value="murog-pulao" />
        <label for="murog-pulao">Murog Pulao</label>

        <input type="checkbox" id="fried-noodles" value="fried-noodles" />
        <label for="fried-noodles">Fried Noodles</label>

        <input type="checkbox" id="vegetable-rolls" value="vegetable-rolls" />
        <label for="vegetable-rolls">Vegetable Rolls</label>
      </fieldset>

      <label for="comments">Additional comments:</label>
      <textarea cols="45" rows="5" name="comments" id="comments"></textarea>

      <button type="submit" id="submit">Submit</button>
    </form>
  </body>
</html>
